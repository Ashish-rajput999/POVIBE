<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Turn your POV into a Spotify playlist. Describe a mood or moment and get the perfect soundtrack." />
  <title>POVibe — Turn Your POV Into a Soundtrack</title>
  <script>
    // Apply saved theme BEFORE React loads to prevent flash
    (function () {
      var theme = localStorage.getItem('povibe_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script src="https://sdk.scdn.co/spotify-player.js" async></script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
